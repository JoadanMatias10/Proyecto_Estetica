name: Escaneo SAST

on:
  push:
    branches: [ main ]

jobs:
  semgrep:
    name: Analisis SAST con Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Ejecutar escaneo SAST
        run: |
          semgrep scan \
          --config p/owasp-top-ten \
          --config p/javascript \
          --config p/nodejs \
          --config p/expressjs \
          --config p/secrets \
          --verbose .